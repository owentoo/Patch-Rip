AWSTemplateFormatVersion: "2010-09-09"
Description: PatchSensei — ECS Fargate cluster + ALB + IAM. HTTP-only for now; HTTPS later.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets (default VPC). Used for both ALB and Fargate tasks.
  GitHubOrg:
    Type: String
    Default: ninjadrewcode
  GitHubRepo:
    Type: String
    Default: patch-sensei-app
  ProofsenseiRdsSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-0f6f1dcb895fc1f23
    Description: RDS SG owning the proofsensei-prod-db Postgres (adopted in the merge).

Resources:

  # ─── Cluster ─────────────────────────────────────────────────────────────
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: patch-sensei-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/patch-sensei-app
      RetentionInDays: 14

  # ─── Security groups ─────────────────────────────────────────────────────
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from internet to PatchSensei ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate task SG - only ALB can reach port 3000
      VpcId: !Ref VpcId

  TaskIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TaskSecurityGroup
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref AlbSecurityGroup

  # Allow the Fargate task SG to reach the proofsensei-prod-db RDS
  # (adopted from ProofSensei during the merge). The RDS SG is external
  # to this stack — referenced by ID via ProofsenseiRdsSecurityGroupId.
  RdsIngressFromTask:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ProofsenseiRdsSecurityGroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref TaskSecurityGroup
      Description: from PatchSensei task SG (post-merge)

  # ─── Load balancer ───────────────────────────────────────────────────────
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: patch-sensei-alb
      Scheme: internet-facing
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Type: application

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: patch-sensei-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200,302,401,404"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ─── IAM roles ───────────────────────────────────────────────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: patch-sensei-task-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadParameterStoreSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/patch-sensei/*"
        - PolicyName: ReadProofsenseiSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:proofsensei-prod/*"

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: patch-sensei-task
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PatchSenseiAppAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:PatchSensei-Ranker"
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:PatchSenseiMockupQueue"
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:PatchSenseiRankMockupQueue"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: arn:aws:s3:::ninja-patchsensei-mockups/*
              - Effect: Allow
                Action: dynamodb:GetItem
                Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/PatchSensei-RankSessions"
        # Inherited from ProofSensei during the merge — proof file
        # storage, runtime secret reads, SES sends.
        - PolicyName: ProofsenseiAppAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: arn:aws:s3:::proofsensei-prod-files-*/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: arn:aws:s3:::proofsensei-prod-files-*
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:proofsensei-prod/*"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  # ─── GitHub OIDC for Actions deploy ──────────────────────────────────────
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList: [sts.amazonaws.com]
      ThumbprintList: [6938fd4d98bab03faadb97b34396831e3780aea1]

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: patch-sensei-github-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: PatchSenseiDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:UpdateService
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:DeregisterTaskDefinition
                Resource: "*"
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskExecutionRole.Arn
                  - !GetAtt TaskRole.Arn

Outputs:
  ClusterName:
    Value: !Ref Cluster
  AlbDnsName:
    Value: !GetAtt Alb.DNSName
    Description: Public ALB DNS — point Shopify App URL here once HTTPS is layered on
  TargetGroupArn:
    Value: !Ref TargetGroup
  TaskSecurityGroupId:
    Value: !Ref TaskSecurityGroup
  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
  GitHubDeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
  EcrRepositoryUri:
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/patch-sensei-app"
